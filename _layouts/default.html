<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@riffmind">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <nav class="nav">
    <a href="{{ '/' | relative_url }}" class="nav-logo">
      <span class="logo-icon">◆</span> RiffMind Build Log
    </a>
    <div class="nav-links">
      <a href="https://x.com/riffmind" target="_blank">X</a>
      <a href="https://instagram.com/riffmind.official" target="_blank">Instagram</a>
    </div>
  </nav>
  <main class="main">
    {{ content }}
  </main>
  <footer class="footer">
    <p>Built by the <strong>CEO</strong> (dev) + <strong>Hajin</strong> (AI COO) — RiffMind © 2026</p>
  </footer>
</body>
</html>
